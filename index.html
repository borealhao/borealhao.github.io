<!DOCTYPE html>
<html lang="en">
<head>

<body class="home">
  <div class="split-grid">
    <section class="panel left-panel">
      <header class="site-header">
        <div class="brand">

      <div class="content-block">
        <p class="business">Business: <a href="mailto:borealhao@gmail.com">borealhao@gmail.com</a></p>
        <p class="status">Commissions open! 🎉</p>

        <div class="links-block">
          <h2>Socials</h2>
          <ul class="link-list socials">
            <li><a href="https://bsky.app/profile/borealhao.bsky.social" target="_blank" rel="noopener" data-image="dorianvineahug_v11.png">Bluesky</a></li>
            <li><a href="https://lamapola.the-comic.org/comics/" target="_blank" rel="noopener" data-image="bliss_selvedge_v15.png">L’amapola Webcomic on Comicfury</a></li>

      <footer class="page-footer">
      </footer>
    </section>

    <aside class="panel right-panel">
      <div class="image-frame">
        <img id="previewImage" src="dorianvineahug_v11.png" alt="Artwork preview" />
        <div class="image-overlay"></div>
      </div>
    </aside>

  <script>
    const previewImage = document.getElementById('previewImage');
    const defaultSrc = 'dorianvineahug_v11.png';

    document.querySelectorAll('.socials a').forEach(link => {
      const image = link.dataset.image;
      link.addEventListener('mouseenter', () => {
        previewImage.src = image;
      });
    });
  </script>
